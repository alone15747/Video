<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Pari Ki Duniya - A magical fairy swipe game. Developed by Ishant.">
  <title>🧚 Pari Ki Duniya</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══════════════════════════════════
       GAME CANVAS
  ══════════════════════════════════ -->
  <canvas id="c"></canvas>

  <!-- ══════════════════════════════════
       HUD (Score / Lives / Best)
  ══════════════════════════════════ -->
  <div id="ui" style="display:none">
    <div class="ui-box">⭐ <span id="sc">0</span></div>
    <div class="ui-box">
      <span class="heart" id="h0">💖</span>
      <span class="heart" id="h1">💖</span>
      <span class="heart" id="h2">💖</span>
    </div>
    <div class="ui-box">🏆 <span id="bs">0</span></div>
  </div>

  <!-- Pause Button -->
  <button id="pause-btn">⏸ Pause</button>

  <!-- Level Badge -->
  <div id="lvl">🌟 Level 2!</div>

  <!-- ══════════════════════════════════
       TITLE SCREEN
  ══════════════════════════════════ -->
  <div class="screen" id="title">
    <div class="fairy-big">🧚‍♀️</div>
    <h1>Pari Ki<br>Duniya</h1>
    <div class="tagline">MAGICAL FAIRY GAME</div>

    <div class="hint-box">
      🧚 Upar se pariyan girengi<br>
      👆 Unhe <b>swipe</b> karke hatao<br>
      🕷️ Bure creatures se bachao<br>
      💎 Rare gem = 50 points!
    </div>

    <button class="btn btn-main" id="play-btn">✨ Khelo ✨</button>
    <div style="color:rgba(255,255,255,0.28);font-size:12px">Pari ke liye banaya gaya 💖</div>
  </div>

  <!-- ══════════════════════════════════
       RESULT SCREEN
  ══════════════════════════════════ -->
  <div class="screen off" id="result">
    <div class="res-icon" id="res-icon">🧚‍♀️</div>
    <div class="res-title" id="res-title">Game Over!</div>
    <div class="res-info"  id="res-info"></div>
    <button class="btn btn-main" id="retry-btn">🔄 Phir Khelo</button>
    <button class="btn btn-sec"  id="home-btn">🏠 Home</button>
  </div>

  <!-- ══════════════════════════════════
       DEVELOPER CREDIT
  ══════════════════════════════════ -->
  <div id="dev-credit">Developed by Ishant ✨</div>

  <!-- ══════════════════════════════════
       SCRIPT
  ══════════════════════════════════ -->
  <script src="script.js"></script>

</body>
</html>
