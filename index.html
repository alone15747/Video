<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧚 Pari Ki Duniya</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative&family=Quicksand&display=swap" rel="stylesheet">
</head>

<body>

<canvas id="c"></canvas>

<div id="ui" style="display:none">
  <div>⭐ <span id="sc">0</span></div>
  <div>
    <span id="h0">💖</span>
    <span id="h1">💖</span>
    <span id="h2">💖</span>
  </div>
  <div>🏆 <span id="bs">0</span></div>
</div>

<button id="pause-btn">⏸ Pause</button>

<!-- TITLE -->
<div class="screen" id="title">
  <h1>🧚 Pari Ki Duniya</h1>
  <button id="play-btn">✨ Khelo ✨</button>

  <!-- 👇 Developer Credit -->
  <div class="credit">Developed by Ishant 💻</div>
</div>

<!-- RESULT -->
<div class="screen off" id="result">
  <h2 id="res-title">Game Over!</h2>
  <div id="res-info"></div>
  <button id="retry-btn">🔄 Retry</button>
</div>

<script src="script.js"></script>
</body>
</html>
